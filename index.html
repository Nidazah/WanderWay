<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WanderWay | Tailored Travel Packages</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="container nav-container">
    <div class="logo">
      <i class="fas fa-globe-americas"></i> WanderWay
    </div>
    <ul class="nav-links">
      <li><a href="#" class="active">Packages</a></li>
      <li><a href="#booking-form">Book Now</a></li>
      <li><a href="#">Destinations</a></li>
    </ul>
  </div>
</nav>

<main class="container">
  <!-- Packages Section -->
  <section id="packages">
    <h2 class="section-title"><i class="fas fa-box-open"></i> Curated Escapes</h2>
    <div class="packages-grid" id="packagesGrid">
      <!-- dynamic JS packages will be injected here -->
    </div>
  </section>

  <!-- Booking Form Section (with dynamic content) -->
  <section id="booking-form" class="booking-section">
    <h2 class="section-title" style="margin-bottom: 1.8rem;"><i class="fas fa-calendar-check"></i> Plan your journey</h2>
    <form id="travelBookingForm">
      <div class="form-row">
        <div class="form-group">
          <label for="fullName"><i class="fas fa-user"></i> Full Name *</label>
          <input type="text" id="fullName" placeholder="Alex Morgan" required>
        </div>
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Email *</label>
          <input type="email" id="email" placeholder="hello@wander.com" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="packageSelect"><i class="fas fa-suitcase-rolling"></i> Select Package *</label>
          <select id="packageSelect" required>
            <option value="">-- Choose your adventure --</option>
          </select>
        </div>
        <div class="form-group">
          <label for="travelers"><i class="fas fa-users"></i> Travelers</label>
          <input type="number" id="travelers" min="1" max="12" value="2">
        </div>
        <div class="form-group">
          <label for="departureDate"><i class="fas fa-calendar-alt"></i> Departure Date *</label>
          <input type="date" id="departureDate" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="specialRequests"><i class="fas fa-comment-dots"></i> Special requests</label>
          <textarea id="specialRequests" rows="2" placeholder="Dietary, room preferences, etc."></textarea>
        </div>
      </div>
      <div class="form-row">
        <button type="submit" class="btn-primary"><i class="fas fa-ticket-alt"></i> Confirm Booking</button>
      </div>
      <!-- Dynamic live summary (JS updates) -->
      <div class="booking-summary" id="liveSummaryPanel">
        <i class="fas fa-info-circle"></i> <strong>Live booking summary</strong>
        <div id="dynamicSummary">Select a package and fill details → real-time preview</div>
      </div>
    </form>
  </section>
</main>

<footer>
  <p><i class="fas fa-map-marked-alt"></i> WanderWay — unlock authentic journeys. ✨ Dynamic content powered by JS</p>
</footer>

<!-- External JavaScript -->
<script src="script.js"></script>
</body>
</html>
